version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: fund_transfer_app
    volumes:
      - .:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fund_transfer_net

  nginx:
    image: nginx:1.25-alpine
    container_name: fund_transfer_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fund_transfer_net

  db:
    image: mysql:8.0
    container_name: fund_transfer_db
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: fund_transfer
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fund_transfer_net

  redis:
    image: redis:7.2-alpine
    container_name: fund_transfer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fund_transfer_net

volumes:
  db_data:
  redis_data:

networks:
  fund_transfer_net:
    driver: bridge
